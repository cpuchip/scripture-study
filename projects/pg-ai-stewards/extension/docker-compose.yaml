services:
  pg:
    build: .
    image: pg-ai-stewards-dev:pg18
    container_name: pg-ai-stewards-dev
    # Optional .env file holds POSTGRES_* and STEWARDS_PROVIDER_*
    # secrets. Falls through to inline defaults if absent. Copy
    # .env.example to .env to fill in real values.
    env_file:
      - path: .env
        required: false
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-stewards}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-stewards}
      POSTGRES_DB: ${POSTGRES_DB:-stewards}
    ports:
      - "55433:5432"   # offset from probe's 55432 so both can run side by side
    # Preload our extension so the bgworker registers in _PG_init.
    # Without this, `CREATE EXTENSION` still works but the worker
    # never starts — enqueued rows would sit in 'pending' forever.
    command:
      - postgres
      - -c
      - shared_preload_libraries=pg_ai_stewards
    extra_hosts:
      # Lets the bgworker reach LM Studio / Ollama on the host on
      # Linux containers (Docker Desktop on Windows/Mac aliases this
      # automatically; on plain Linux Docker we need the explicit map).
      - "host.docker.internal:host-gateway"
    volumes:
      - pgdata:/var/lib/postgresql
      - ./init:/docker-entrypoint-initdb.d:ro
      # YT-T.4 (substrate-yt-transcripts, 2026-05-19): READ-ONLY mount
      # of workspace yt/ so stewards.import_yt_transcript() can read
      # cues.json + metadata.json via pg_read_file. Bridge has the same
      # path mounted rw for writes; pg only reads.
      - ../../../yt:/opt/yt/yt:ro
    healthcheck:
      # Bridge depends_on this; pg_isready is the standard probe.
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-stewards} -d ${POSTGRES_DB:-stewards}"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 10s
    # Match bridge/ui policy — pg is the foundation, so without auto-restart
    # a Docker Desktop restart or host reboot leaves pg down and the other
    # two flapping (they restart, fail to reach pg:5432, exit, repeat).
    # `unless-stopped` still respects an intentional `docker compose stop pg`.
    restart: unless-stopped

  bridge:
    # Long-lived MCP bridge daemon — spawns the seven stdio MCP server
    # binaries on demand, brokers tool calls between substrate-internal
    # agents and the external MCP world. Replaces the earlier
    # host-shell `stewards-mcp bridge run` setup.
    #
    # Build context = repo root (../../..) so the multi-stage Dockerfile
    # can reach scripts/ and projects/. The compose file lives at
    # projects/pg-ai-stewards/extension/, so ../../.. = repo root.
    build:
      context: ../../..
      dockerfile: projects/pg-ai-stewards/extension/bridge.Dockerfile
    image: pg-ai-stewards-bridge:latest
    container_name: pg-ai-stewards-bridge
    depends_on:
      pg:
        condition: service_healthy
    env_file:
      - path: .env
        required: false
    environment:
      # DSN points at the compose service name `pg` on the internal
      # network (port 5432). The host-side 55433 mapping is for
      # external tools like psql; internally we use the service.
      STEWARDS_DSN: "postgres://${POSTGRES_USER:-stewards}:${POSTGRES_PASSWORD:-stewards}@pg:5432/${POSTGRES_DB:-stewards}?sslmode=disable"
      # Tokens for the spawned MCP servers. These flow through to
      # gospel-mcp / becoming-mcp at spawn time via the $$env:
      # placeholders in stewards.mcp_servers.env.
      GOSPEL_ENGINE_URL: "${GOSPEL_ENGINE_URL:-https://engine.ibeco.me}"
      GOSPEL_ENGINE_TOKEN: "${GOSPEL_ENGINE_TOKEN:-}"
      BECOMING_URL: "${BECOMING_URL:-https://ibeco.me}"
      BECOMING_TOKEN: "${BECOMING_TOKEN:-}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # /workspace mount: READ-WRITE as of 2026-05-22 (was :ro). The
    # autonomous materializer goroutine (am1 — see
    # .spec/proposals/autonomous-materializer.md) drains
    # stewards.pending_file_writes by exec'ing `stewards-cli
    # materialize-writes --repo-root /workspace`. That step needs rw.
    #
    # Real safety boundaries (not the mount flag):
    #   - stewards-cli validates target_path against repo-root (no ".."
    #     escape, no absolute paths)
    #   - pending_file_writes.write_mode CHECK restricts to {create,append}
    #   - fs-read-mcp's sandbox enforces read-path scope at the MCP tool
    #     layer regardless of underlying mount
    #
    # Workspace yt/ is ALSO mounted READ-WRITE at /opt/yt/yt
    # (substrate-yt-transcripts, 2026-05-19, D-YTT1) — yt-mcp downloads
    # transcripts there; that path IS the local cache visible to host
    # tooling + git.
    volumes:
      - ../../..:/workspace:rw
      - ../../../yt:/opt/yt/yt:rw
    restart: unless-stopped
    # ENTRYPOINT is `stewards-mcp bridge run` (set in bridge.Dockerfile).
    # Override with `command:` here if workers/tick need tuning.

  ui:
    # Local pg-ai-stewards UI (Phase 3f v1) — Vue SPA + Go API in a
    # single binary. Single-user, local-only; bound to 127.0.0.1 on
    # the host for safety. ~12MB binary; ~50MB image after the
    # frontend build stage.
    build:
      context: ../../..
      dockerfile: projects/pg-ai-stewards/extension/ui.Dockerfile
    image: pg-ai-stewards-ui:latest
    container_name: pg-ai-stewards-ui
    depends_on:
      pg:
        condition: service_healthy
    env_file:
      - path: .env
        required: false
    environment:
      STEWARDS_DSN: "postgres://${POSTGRES_USER:-stewards}:${POSTGRES_PASSWORD:-stewards}@pg:5432/${POSTGRES_DB:-stewards}?sslmode=disable"
    ports:
      # 127.0.0.1 binding — local-only. If you ever want LAN access,
      # change to "8080:8080" or set up an SSH tunnel.
      - "127.0.0.1:8080:8080"
    restart: unless-stopped

volumes:
  pgdata:
