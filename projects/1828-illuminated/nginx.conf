# nginx config for 1828-illuminated. Single-server, SPA-friendly fallback,
# plus /api/* reverse-proxy to the sibling backend container.

# Upstream resolved by Docker's internal DNS (service name in compose).
upstream i1828_backend {
    server backend:8080;
    keepalive 16;
}

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # /api/* → backend (same-origin to the browser; no CORS dance needed).
    # proxy_read_timeout > LLM_TIMEOUT_SECONDS so render calls fit.
    location /api/ {
        proxy_pass http://i1828_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 75s;
        proxy_send_timeout 75s;
        proxy_cache off;
    }

    # SPA history-mode: any unknown path falls back to index.html so the
    # Vue router handles client-side routing.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long-cache the hashed assets bundle
    location /assets/ {
        expires 1y;
        access_log off;
        add_header Cache-Control "public, immutable";
    }

    # Don't cache index.html — needed for SPA deploys to land
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # Health check endpoint (frontend's own; the /api/healthz check goes
    # through the proxy to the backend).
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1024;
}
