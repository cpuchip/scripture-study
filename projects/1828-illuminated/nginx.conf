# nginx config for 1828-illuminated. Single-server, SPA-friendly fallback.
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA history-mode: any unknown path falls back to index.html so the
    # Vue router handles client-side routing.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long-cache the hashed assets bundle
    location /assets/ {
        expires 1y;
        access_log off;
        add_header Cache-Control "public, immutable";
    }

    # Don't cache index.html — needed for SPA deploys to land
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # Health check endpoint
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1024;
}
