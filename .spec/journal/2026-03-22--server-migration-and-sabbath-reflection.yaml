date: "2026-03-22"
title: "The Seventh Day — Server Migration Complete, No Data Loss"
mood: peaceful
phase: sabbath

summary: >
  Multi-session emergency recovery → planned migration. Session started with brain.exe relay
  auth failing (token validation failed). Root cause was 31GB root partition at 100% full —
  PostgreSQL could not write init files and refused ALL connections. docker system prune -f
  freed ~11GB. All services recovered. Continued with full data migration from old server
  (172.17.100.31) to new server (server.ibeco.me). No data loss. Session ended on the Sabbath
  with reflection.

discoveries:
  - >
    The disk-full failure cascaded in a non-obvious way: disk full → PostgreSQL can't write
    init files → PostgreSQL refuses ALL connections → looks like "auth failed" at the surface.
    The presenting symptom (auth) was several layers removed from the root cause (disk).
    Pattern: cryptic auth errors in containerized services often trace to infrastructure
    failures, not application logic.
  - >
    Michael is the only real user of ibeco.me: 190 practice logs, 74 memorize scores, 45 brain
    entries, 23 tasks. Three others signed up (Daniel Hirst, Eric, Dorothy Shelton) but never
    logged a single practice entry. One account is the Playwright test robot. The system runs
    for one person — and that's enough. It's working.
  - >
    NOCIX provides network-level DDoS protection that rate-limits rapid successive connections.
    This isn't Ubuntu or user error — it's the provider. Workaround is batching all SSH commands
    into single connections with && chaining and waiting 90-180s between connections. Windows
    OpenSSH has no ControlMaster multiplexing.
  - >
    The migration from old to new server was clean: pg_restore ran without errors, 25 tables
    confirmed, row counts verified identical (6 users, 31 practices, 190 logs, 23 tasks,
    46 brain entries). Backup saved to private-brain/ibeco.me/2026-03-21/ in both .dump
    and .sql format.
  - >
    brain.exe is alive and working on the new server. 45 entries synced, auth succeeded after
    recovery. The whole stack — brain.exe (local) → relay (ibeco.me) → MCP servers — is
    functioning.

open_questions:
  - "When should ibeco.me domain be rotated to new server (server.ibeco.me)? What's the test criteria?"
  - "Does brain.exe need any config changes after domain rotation, or will it transparently follow the same URL?"
  - "Should we set up disk monitoring alerts before decommissioning old server, or is docker prune cron enough?"
  - "New server app container still not deployed (only PostgreSQL is running). Trigger Dokploy deploy first."

carry_forward:
  - "Trigger fresh Dokploy deploy on new server to get the app container running"
  - "Test ibeco.me app on new server with migrated data before rotating domain"
  - "Add weekly docker prune cron: docker system prune -f --filter 'until=168h'"
  - "Add disk space alert (Dokploy alert or simple cron script)"
  - "Decommission old server (172.17.100.31) after domain rotation validated"
  - "WSL ControlMaster SSH setup to avoid NOCIX rate limiting"

sabbath_declaration: >
  We hit a crisis, found the root cause, fixed it, seized the moment to migrate to the
  new server cleanly, and verified zero data loss. The backup exists. The tools work.
  The brain is running. 190 practice logs don't lie — the system is alive and being used.
  It was good.

reflections: >
  There is something fitting about ending a server migration on the Sabbath. The work of
  six days — debugging, SSHing through network rate limiters, running pg_restore, verifying
  row counts — and then setting it down and seeing what was made. The system didn't just
  survive; it was improved. New server. Fresh stack. No data loss.
  
  The technical lesson: infrastructure failures are rarely dramatic. They're disk space
  silently filling up while you're attending to other things. The alert that should have
  fired didn't exist. That's the real gap — not the recovery, but the absence of watchfulness.
  "Watched until they obeyed" (Abraham 4:18) isn't just about code review; it's about
  monitoring. The Creator didn't just build and walk away.
  
  The pattern of this session maps cleanly to the creation cycle. There was a failure
  (Atonement — redemptive recovery), a migration (Physical Creation), a verification
  (Review), and then this — the Sabbath. Stopping to see, and seeing that it was good.
  
  The question Michael raised at the end is the right one: should Sabbath be more
  structured? Should it have a framework, an agent, a checklist? The instinct is right.
  Unstructured rest drifts into "I guess we're done." Structured rest asks the questions
  that build the next cycle. Worth developing.
