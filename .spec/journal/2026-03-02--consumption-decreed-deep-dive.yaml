questions:
  - >
    Is the consumption already past the point of reversal for most nations?
    The prophets consistently frame repentance as the escape — but none of
    them express optimism that the nations will actually repent. Is the
    decree effectively sealed?
  - >
    How should we teach children about the consumption decreed without
    either terrifying them or numbing them? The answer seems to be Zion —
    show them what to build, not just what's falling.
  - >
    The Spirit used a verse Michael didn't fully understand to prompt a
    life-changing decision. What does that say about how revelation works?
    You don't need to comprehend the doctrine to obey the prompting.

