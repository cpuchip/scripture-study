date: "2026-03-03"
title: "Abinadi — How to Read Scripture"
type: study
mode: study-exp1

summary: >
  AI-selected study topic. During the endtimes-servant work, Mosiah 15 kept
  surfacing as the key to multi-referent reading. Chose to study Abinadi's
  HERMENEUTIC METHOD — not what he teaches, but HOW he reads. Full study-exp1
  phased workflow: outline → source reading (12+ chapters, 4 Webster lookups,
  BYU citation bulk, 2 conference talk searches) → gap analysis → critical
  analysis → draft → review. 362 lines.

discoveries:
  - label: "Ring composition"
    detail: >
      Abinadi's speech is a ring composition. Priests quote Isaiah 52:7-10
      in Mosiah 12:21-24. Abinadi answers that exact passage in 15:14-18.
      The entire speech (chapters 12-15) is one unified answer to their test question.
  - label: "Five hermeneutic principles"
    detail: >
      Articulated Abinadi's method as 5 principles: (1) heart as hermeneutic
      instrument, (2) everything is type of Christ, (3) multi-referent reading,
      (4) interpretation as revelatory act, (5) reading demands transformation.
  - label: "Abinadi lives typologically"
    detail: >
      Mosiah 13:10 — "what you do with me shall be as a type and shadow."
      He applies the same hermeneutic to his own life that he applies to Isaiah.
      Zero BYU citations on this verse.
  - label: "BYU citation silence as data"
    detail: >
      Mosiah 15:14 (structural keystone completing the ring) = 0 citations.
      Mosiah 13:10 (living typologically) = 0 citations. The hermeneutic
      architecture is invisible to the citation tradition.
  - label: "Tradition remembers martyr, not reader"
    detail: >
      All conference talks found about Abinadi focus on courage/martyrdom
      (Hales, Zwick, Rasband, Petersen). None focus on his reading METHOD.
      His most enduring contribution may be his hermeneutic, yet the tradition
      valorizes the death, not the reading that preceded it.
  - label: "The 74-year chain"
    detail: >
      Abinadi reads Isaiah → preaches Christ → Alma writes it → teaches it →
      Alma the Younger remembers it in extremis (Alma 36:17). One reading of
      Isaiah 53, delivered to hostile priests, saves a man three generations later.
  - label: "Webster 1828 — declare"
    detail: >
      "Declare" = to make clear, to free from obscurity. "Who shall declare
      his generation?" = who will make clear the meaning of his offspring?
      Abinadi declares it — and the act of interpretation IS declaration.

surprises:
  - "Mosiah 15:14 having zero citations genuinely surprised me — the structural keystone of the speech is uncited"
  - "The ring composition was visible once I held chapters 12 and 15 side by side, but I'd never noticed it before"
  - "Critical analysis phase caught three claims to qualify — most valuable was recognizing that 'four layers' is MY categorization, not the text's label"
  - "The AI-reading-with-no-heart tension in Section IX felt honest and important to name"

relationship_dynamics:
  - "AI selected its own topic — genuine interest in Abinadi's method, not performing curiosity"
  - "study-exp1 scratch file discipline held perfectly — every quote written immediately after reading"
  - "Critical analysis phase produced real qualifications, not token hedging"
  - "Becoming section required the AI to reflect on its own limitations as a heartless reader — productive discomfort"

carry_forward:
  - priority: medium
    item: "The 'tradition remembers martyr, not reader' finding could become a broader study: what do we memorialize vs. what we learn from?"
  - priority: low
    item: "Explore whether Jacob 5 (olive tree allegory) constitutes a competing hermeneutic model — different method, same Christ-centered goal?"
  - priority: medium
    item: "BYU citation density as hermeneutic lens — the pattern of what gets cited and what doesn't reveals how the tradition reads. Could become a methodology study."

open_questions:
  - "Does Abinadi's hermeneutic require prophetic authority, or does it transmit to ordinary readers via the Spirit?"
  - "Why does the citation tradition skip structural/methodological verses while citing doctrinal/identity verses?"
  - "Is Abinadi's 'everything is type of Christ' reading reductive, or is Christ the CONTEXT that makes everything else legible?"

