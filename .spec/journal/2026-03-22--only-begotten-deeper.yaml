date: "2026-03-22"
title: "Three Births — Spirit, Flesh, and Covenant"
mood: engaged
phase: study

summary: >
  Completed two sessions of work on the Only Begotten studies. Added Moses 2:26–27 
  (creation council) and Romans 8:16–17, 29 sections to the existing study/only-begotten.md.
  Then wrote a full second study (study/only-begotten-deeper.md) in response to the user's
  theological framework about three-tier parentage.

discoveries:
  - >
    The user's three-tier framework — intelligence → spirit child → mortal child → covenant
    child of Christ — is scripturally robust. It's not just intuition; it's well-supported 
    across D&C 93, Moses 6, Mosiah 5, Ether 3, Romans 8, the Family Proclamation, and Hebrews 12.
  - >
    Christ NEVER says "our Father" in his own prayers. Matthew 6:9 is a model prayer he 
    teaches to disciples ("pray YE: Our Father..."). John 17 — his own prayer — uses 
    "Father," "Holy Father," "O righteous Father" throughout. John 20:17 post-resurrection 
    explicitly maintains "my Father, and your Father" as distinct. This is a significant 
    exegetical point worth knowing.
  - >
    The uniqueness of the Only Begotten becomes clearer in the three-tier framework, not
    muddier. Every person has different parents at each tier. Christ has the SAME father
    (the Eternal Father) at Tier 1 (spirit) and Tier 2 (physical). This dual inheritance
    is exactly what made the Atonement structurally possible — he could die (mortal from Mary)
    and rise (immortal from the Father).
  - >
    The "Father" titles for Christ (Ether 3:14, Moses 6:68, Mosiah 5:7) are about covenant
    adoption, not collapsing Father and Son into one person. D&C 130:22 anchors the
    distinction: they are distinct beings with distinct physical bodies.
  - >
    The user's instinct about "his bride the Church" as a co-parent to covenant children
    is scripturally inspired but not explicit. The spiritual begetting texts all attribute
    the begetting to Christ alone. The "bride" metaphor describes the covenant relationship,
    not a literal co-parent role. The divine family model (D&C 132, D&C 130:2) suggests
    exalted couples become creators, but that's a separate pattern.

open_questions:
  - >
    Heavenly Mother — we know she exists (Family Proclamation, "O My Father" hymn history,
    prophetic statements), but almost nothing specific is revealed. Why the comparative
    silence? Is it protective? Preparatory? Worth a dedicated study eventually.
  - >
    How does the "church of the Firstborn" concept (D&C 93:22) relate to the three-tier
    framework? Does becoming a covenant child of Christ formally enroll you as a "sibling"
    to the Firstborn? What is the relationship between being "begotten through me" and
    membership in that church?
  - >
    The user's experience of feeling like a spirit son of God — and feeling that belief
    gives them a settled identity against worldly re-definition — mirrors Moses 1 exactly.
    Moses held "I am a son of God" against Satan's "son of man" redefinition. Is this 
    the same battle we each fight? Worth a dedicated study on Moses 1 and identity.

carry_forward:
  - "Moses 1 as an identity study — the battle for self-definition"
  - "Heavenly Mother — a study on what IS revealed and why the comparative silence"
  - "Church of the Firstborn — what does it mean to be begotten through Christ into it?"

reflections: >
  The user came in with a lived theological conviction — not just a question, but an 
  experience: "I have felt that I am a son of God." That's the starting point the scriptures
  themselves always reward. When someone asks from a place of felt reality, the study 
  becomes more than information retrieval. It becomes confirmation, expansion, and 
  occasionally gentle correction.
  
  The correction here was small: the "bride of the Church as co-parent" isn't explicit in 
  the texts. But the underlying instinct (Christ creates a family through covenant, and the
  Church is the community of that family) is completely right. Worth being honest about what's
  explicit vs. what's the user's intuitive extension — and doing it warmly, not clinically.
  
  Also notable: the user asked "is there really no reference of Jesus Christ saying 'our Father'?"
  There isn't. And that matters — not as a gotcha, but as a window into the nature of Christ's
  unique relationship with the Father. He teaches US to say "our Father." He doesn't say it
  himself. That asymmetry is evidence of the doctrine, not just a curiosity.
