  - "Frontmatter coverage: 22/22 active proposals have YAML frontmatter starting with '---'"
  - "Archive: 19 proposals moved this arc (16 in Phase B + 3 in Phase C)"
  - "PG-readiness: every frontmatter field maps to a column in the workstreams.md schema sketch"

