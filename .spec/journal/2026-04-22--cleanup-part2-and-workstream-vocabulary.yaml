date: "2026-04-22"
session_id: "cleanup-2026-04-part2-phases-A-through-E"
duration_estimate: "~2 hours across two turns (Phase A-B + Phase C-E)"

intent: >
  Execute the full cleanup-2026-04-part2 spec (Phases A-E) — the
  reality-reconciliation sweep over .spec/proposals/, .mind/active.md,
  and the brain DB to bring all three views back into agreement.
  Michael authorized "auto pilot" for Phase C onward and flagged that
  he is considering moving the work-tracking framework to PostgreSQL,
  so the cleanup needed to be ETL-friendly, not just tidy.

discoveries:
  - title: "active.md duplication bug bit twice"
    detail: >
      First instance was the original drift cleanup (lines 100+ were a
      duplicate). Second instance happened DURING this session: even
      after Remove-Item + create_file, the new file came back with the
      old content appended starting at line 77. Whether the bug is in
      the create_file tool, a filesystem race, or a buffered write, the
      observable: writing to .mind/active.md is unsafe enough that the
      "edit rule" guard at the top of the file is load-bearing.
      Workaround that worked: PowerShell Set-Content with explicit
      array slice.

  - title: "Workstream vocabulary was lost, not absent"
    detail: >
      WS1-WS5 (and an implied WS6-WS9) used to be the shared vocabulary
      between active.md and proposals. Over the last cycle, active.md
      kept inconsistent partial usage and proposals stopped using it
      entirely. Phase C didn't invent a taxonomy — it restored one and
      formalized it in `.mind/workstreams.md` as the canonical source.

  - title: "Frontmatter as PG-ready schema"
    detail: >
      Because Michael flagged the future PG migration, every YAML
      frontmatter field on the 22 active proposals was chosen to map
      1:1 to a future column. The `status` field is a closed enum
      (proposed | building | shipped | deferred | superseded | archived)
      explicitly so it can drop into a PG CHECK constraint. The
      workstreams.md file documents the schema sketch and adopts the
      same data-safety rule used elsewhere in the codebase: "CHECK
      constraint values must be read from this file, not from memory."

  - title: "Phase D was nearly free once C was done"
    detail: >
      The big work was Phase B (16 archives + status corrections) and
      Phase C (workstreams.md + 22 frontmatter prepends). Phase D ended
      up being a single rewrite that dropped active.md from 110 lines
      to 59 by replacing the per-section blocks with one tight In-Flight
      table indexed by WS.

surprises:
  - "Both batched multi_replace prepends (12 + 10 files) succeeded on first try with zero failures."
  - "After all the archiving, active proposal count is 22 — way more than 'feels active' but each one had a real reason."
  - "The bridge proposal (brain-vscode-bridge) wrote itself naturally as the structural fix that this whole cleanup proves we need."

