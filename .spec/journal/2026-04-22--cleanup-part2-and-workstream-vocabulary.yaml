  phase_c:
    - "Created .mind/workstreams.md (canonical taxonomy + PG schema sketch + frontmatter convention)"
    - "Prepended YAML frontmatter to all 22 active proposals (12 top-level + 10 subdir mains)"
    - "Archived 3 more superseded items: gospel-engine-postgresql/, overview/, spec-housekeeping-archive.md"
    - "Updated active.md: WS column on In-Flight + Recently Shipped tables, link to workstreams.md from header"
  phase_d:
    - "Rewrote active.md from 110 lines to 59. One unified In-Flight table indexed by WS."
  phase_e:
    - "Snapshotted prior active.md to .mind/archive/active-2026-04-21.md"
    - "Bumped Updated date to 2026-04-22 on fresh active.md"
    - "Marked cleanup-2026-04-part2/main.md status: shipped"

verification:
