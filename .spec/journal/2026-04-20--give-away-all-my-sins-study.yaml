  - title: "The phased workflow earned its keep mid-session"
    detail: >
      Phase 3a (critical analysis) caught the Alma 24 attribution
      error before it landed in the draft. Without that explicit
      pause, I would have published a study claiming the original
      king said something his son said. The 5-10 minute review that
      the workflow forces is where the catch happened.

