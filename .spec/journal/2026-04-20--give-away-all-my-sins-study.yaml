open_questions:
  - title: "Why did the king pray 'make thyself known unto me' instead of 'forgive me'?"
    detail: >
      Most prayers in scripture for forgiveness ask for forgiveness.
      The king asked to KNOW. That ordering — knowing before being
      saved — deserves its own study. The result clause ("to know
      thee") got two paragraphs in this study but could carry an
      entire study on its own.

  - title: "What other 'verb-shifts' in scripture mark conversion?"
    detail: >
      The father's "give away" → son's "take away" → people's
      "rather than take, give" is a beautiful intergenerational
      verb chain. Are there other examples? Alma the Younger →
      his sons? Lehi → Nephi? Worth a wide search.
