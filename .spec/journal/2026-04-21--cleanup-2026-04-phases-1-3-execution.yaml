  - title: "Brain test fixtures should reference constants, not literal model strings"
    priority: low
    note: >
      Every test that hardcoded `"claude-opus-4.6"` had to be updated
      separately. If `defaultModelForStage` returned `config.PipelineBigModel`
      and tests asserted the same constant, this entire sweep would
      have been a one-line change. Refactor opportunity, not urgent.

