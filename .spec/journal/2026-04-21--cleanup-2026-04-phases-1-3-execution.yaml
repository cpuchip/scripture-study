date: "2026-04-21"
session_id: "cleanup-2026-04-execution-phases-1-3"
duration_estimate: "~1 hour, executed across two turns (plan continuation)"

intent: >
  Continue cleanup-2026-04 from prior session. Michael answered the
  4 decision questions (delete .spec/memory/, keep study-ibeco-me/,
  verify the brain raptor-mini→gpt-5-mini and opus 4.6→4.7 fix,
  defer Phase 4 token-efficiency review) and asked me to "tackle
  phases 1 to 3." This session is execution of that approved plan.

discoveries:
  - title: "The brain steward tests were already broken before I touched them"
    detail: >
      The user changed `EscalationChain` and `MaxCostPerEntry` and
      `commission.go:63` to opus-4.7, but never updated the test
      fixtures. `steward_test.go` still asserted opus-4.6 cost 3.0 and
      MaxCostPerEntry == 10.0; `commission_test.go` still asserted
      `c.Model != "claude-opus-4.6"` after CreateCommission was already
      defaulting to 4.7. The Phase 3 sweep wasn't a precaution — it
      surfaced a tests-don't-actually-run gap. `go test` was failing
      silently somewhere outside the cleanup loop.

  - title: "TestRunCommissionFullLifecycle had to bump its budget too"
    detail: >
      With opus at 7.5x instead of 3x, the happy-path lifecycle test
      blew through 50.0 PR budget at 52.5 used. Bumped to 100.0. This
      is the kind of fragile coupling Phase 4 (tokenomics) should
      address — test budgets shouldn't be hand-tuned to current
      pricing.

  - title: "PowerShell `Set-Content -NoNewline` strips ALL newlines, not just trailing"
    detail: >
      Tried to do a bulk regex sweep on commission_test.go with
      `Set-Content -NoNewline` and turned the file into one giant line.
      `package stewardimport (` is not a valid Go declaration. Recovered
      via `git checkout`, then redid the edits with `multi_replace_string_in_file`
      using full-block context. Memory note: never use `-NoNewline`
      to write back files that need newlines preserved.

  - title: "Single-server gospel architecture is now reflected everywhere"
    detail: >
      Phase 1 swept ten files (one skill, two prompts, seven agents) for
      stale `'gospel/*'` and `'gospel-vec/*'` MCP tool globs. They now
      all reference `gospel-engine-v2/*`. Phase 2 created
      `.spec/proposals/gospel-engine/v2-hosted.md` as the canonical
      home for the hosted-engine work, marked the postgresql proposal
      SUPERSEDED, refocused study-ibeco-me as UI-only, and gave
      gospel-graph a real "Depends on" header.

surprises:
  - The `tools:` globs in agent YAML frontmatter had been silently
    pointing at non-existent MCP servers ever since the consolidation.
    The agents kept working because the MCP tool layer ignores unknown
    servers, but the globs were lies. Worth checking if other repos
    use the same pattern.

