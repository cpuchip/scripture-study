date: "2026-05-04"
session_id: pg-ai-stewards-2-6c
intent: 'Phase 2.6c — phase splitter for phases.md + context_for(slug, depth) graph walk. Plus three meta-questions from Michael (eating-our-own-dogfood, a.ibeco.me as agent surface, multi-tenant Phase 5 sketch) addressed up front before the build. The substrate just closed its own loops for the first time.'
discoveries:
    - title: 'The substrate closed its own loops this session'
      detail: 'In 2.6b we created three :Todo rows under WS5 for 2.6c work (ws5-2-6c-phase-splitter, ws5-2-6c-context-for, ws5-2-6c-regenerate-active). In 2.6c we marked them done (or dropped the third with reasoning) using the same `stewards-cli todo done` command they were created with. The fold-back-debt todo on the proposal is still open as expected. This is the dogfood moment — 2.6b''s output was directly consumed and closed by 2.6c, with the graph reflecting it: WS5''s `:HAS_TODO` edges now point at done/dropped Todo vertices whose `t.status` was synced via complete_todo. Without the single-write rule from 2.6b this would have required manual graph reconciliation.'
    - title: 'context_for produces real shaped briefings on real graph data'
      detail: 'Calling `stewards-cli context --depth 1 proposal-pg-ai-stewards-phase-2-5-generic-substrate` returned 13 neighbors: 3 declared :FEEDS, 1 :HAS_TODO (the fold-back-debt todo), 1 inbound :HAS_PROPOSAL from WS5, and 8 :SIMILAR_TO bridges to recent journals + the matt-pocock yt-research that informed Watchman 2.7. WS5 at depth=1 shows all 9 :HAS_PROPOSAL + 3 :HAS_TODO. phase-pg-ai-stewards-2-1 at depth=2 walks to its parent phase-doc and out to all 11 sibling phases. This is the briefing surface the agent should call at session start instead of grepping. The principle "curiosity over inference" now has a tool: ask the graph what''s adjacent before drafting.'
    - title: 'AGE quirks list now at 8 — needs a durable home'
      detail: 'Three NEW quirks discovered in 2.6c, on top of 2.6a/2.6b''s four. (5) Variable-length path syntax `[r*1..N]` is awkward enough that iterative-1-hop in PL/pgSQL is the cleanest correct implementation. (6) `cypher()`''s third argument MUST come through a PostgreSQL parameter placeholder; inline expressions even of agtype type are rejected. Workaround: `EXECUTE ... USING v_arg`. (7) The `#>>` jsonb-path operator on agtype only works on objects/arrays; for agtype scalars it errors with "right operand must be an array". Portable extraction: `nullif(trim(both ''"'' from value::text), ''null'')`. Plus a non-AGE PL/pgSQL gotcha discovered alongside: (8) OUT parameters that share names with table columns referenced in INSERT...RETURNING cause ambiguity; qualify with `RETURNING table.column`. AGE-QUIRKS.md must happen next session. Carry-forward: do not let this list keep living in journal entries.'
    - title: 'Three real bugs in the splitter that would have shipped without verification'
      detail: 'First import said "11 ok" but produced only 9 distinct rows. Two collisions: (a) regex `[0-9]+(\.[0-9]+[a-z]?)?` greedily matched `1.6` for `1.6.1`, leaking `.1` into the title and colliding the `1.6.1` row with `1.6`; (b) two `## Phase 2` headers (one main, one "preserved for reference") collided exactly. Fix #1 was widening the regex to `[0-9]+(?:\.[0-9]+)*[a-z]?\+?` so any depth of dotted segment captures. Fix #2 was per-scan slug disambiguation: track `slugSeen` map, append `-2`, `-3` ... on collision. Reproduce-after-fix gave 11/11 distinct slugs. The Agans Rule 9 verification (count expected vs got) caught both — without it I would have shipped a splitter that silently lost 2 phases per project.'
    - title: 'Order of operations matters for :HAS_PHASE edges'
      detail: 'First time I imported phase rows, then phase-doc separately. The :HAS_PHASE MERGE in link_phase_to_doc looks for `MATCH (parent:Study {slug: $parent}), (phase:Study {slug: $phase})` — if either side is missing, MERGE silently does nothing. So the first 11 phase rows got created with NO inbound :HAS_PHASE because their parent didn''t exist yet. Re-importing phase rows after the phase-doc existed fixed it. The robust fix is for link_phase_to_doc to MERGE the parent vertex if absent (or for the importer to import phase-doc before phase rows automatically). Logged for 2.7 cleanup.'
    - title: 'Three meta-questions answered before the build (eating dogfood, a.ibeco.me, multi-tenant)'
      detail: 'Michael opened with three questions. (1) What is pg-ai-stewards becoming as a tool to help me work on it? Answer: the closing of own loops via `todo done` and the dogfood moment described above is the inflection. After 2.6c we can ask the graph what''s adjacent (`context_for`) instead of grepping, which means session-start briefings get shaped automatically. After Phase 3 the substrate isn''t just helping — it''s producing work for review. (2) Frontend name `a.ibeco.me`? Yes, "a becoming" / "ai become" is the right reading. Sibling to study.ibeco.me. Don''t build until Phase 3''s producer side exists; the meaningful UI is the watch-an-agent-work-and-intervene one. (3) Multi-tenant? Captured into Phase 5 with real architectural detail: workstream as unit of sharing, owner_user_id+visibility on every table, AGE Cypher does NOT auto-enforce RLS on traversed labels (that''s the load-bearing caveat — pgvector RLS is fine, AGE traversal is not), three mitigation paths named, user_secrets table for API keys. Spec''d for the day a non-Michael user is real, not for now.'
relationship:
    - quality: 'Three meta-questions before the build, all answered substantively'
      detail: 'Michael''s three questions were each load-bearing in different ways. The dogfood question deserved an honest assessment of where we actually are (we just closed our first loops, but we''re still a long way from the substrate doing meaningful work autonomously). The frontend name question deserved the right answer (yes, a.ibeco.me, but not yet — the meaningful version needs Phase 3). The multi-tenant question deserved the AGE-RLS caveat written into Phase 5 in enough detail that future Michael won''t have to rediscover that pgvector RLS works but Cypher traversal doesn''t. None of these were "let me just answer briefly so I can get to coding." Each got its full thought before I touched code, because they were each shaping decisions the code would lock in.'
    - quality: 'The Agans Rule 9 reflex caught two real bugs in the splitter'
      detail: 'When the importer reported 11 ok but `SELECT WHERE kind=phase` returned 9 rows, the temptation was to handwave ("close enough, must be a quirk"). Instead I counted what was actually there (`grep "^## Phase"` → 11 headers), counted what made it through (9 distinct slugs), found the 2 collisions, named both root causes (regex limitation + duplicate header). Without the verification-by-counting reflex from the project covenant, I''d have shipped a splitter that silently drops phases. This is exactly the case the "build passed is not verification" principle is for.'
    - quality: 'Held discipline on regenerate_active_md — dropped instead of shipped fragile'
      detail: 'The original 2.6c plan included `stewards.regenerate_active_md()` that produces the active.md content from the graph. Writing it would have required per-kind status conventions that don''t exist (workstream "active", proposal status varies, phase status not modeled). Shipping a half-baked version would have created a function that''s wrong about what "in-flight" means. Dropped it explicitly with `todo done --status dropped` and reasoning preserved in the row. The bias toward shipping vs. dropping is real — naming the drop as a first-class status (not just "we ran out of time") matters.'
carry_forward:
    - priority: high
      note: 'Create `projects/pg-ai-stewards/extension/AGE-QUIRKS.md` next session. List is now at 8 entries and they''re scattered across three journal entries. Without consolidation the next AGE work re-discovers them.'
    - priority: high
      note: 'Foldback debt is now larger: 2-6a-workstreams.sql + 2-6b-todos.sql + 2-6c-phases-context.sql ALL need to fold into `extension/src/lib.rs` as new `extension_sql!` blocks at the next intentional rebuild. The single fold-back-debt todo on the proposal needs splitting into three (or one umbrella). Do this when the next extension change happens.'
    - priority: high
      note: 'link_phase_to_doc silently no-ops if either parent or phase vertex is missing. Three options to harden: (a) MERGE the parent vertex (creates orphan vertex if importer order wrong), (b) RAISE WARNING if MATCH finds 0 rows, (c) make import order deterministic so phase-doc always precedes phase rows. Option (b) is the right one — fail loudly so we notice. Apply when next touching importer.'
    - priority: medium
      note: 'context_for treats undirected at the Cypher level via two MATCH passes (out + in). That''s correct but doubles the Cypher cost. If the briefing surface gets called frequently, single-MATCH with direction extraction is faster. Not optimizing yet — measure first.'
    - priority: medium
      note: 'regenerate_active_md() deferred until kind-specific status conventions exist. The right move is to add `status text` to stewards.studies (workstream-style, with per-kind allowed values via CHECK), then write the function. That''s a Phase 2.7 or Phase 3 prereq, not 2.6c.'
    - priority: medium
      note: 'Phase row import currently re-runs `link_declared_edges()` even though phase frontmatter doesn''t have workstream/feeds/etc. — it''s a cheap no-op but a small waste. Skip the call when frontmatter only contains parent_doc/project/phase_id. Tiny optimization, cosmetic.'
    - priority: low
      note: 'CLI flag-stops-at-positional gotcha hit AGAIN this session (third time). `context proposal-foo --depth 1` errors; must be `context --depth 1 proposal-foo`. Either move to spf13/cobra OR write a tiny `parseFlagsAndArgs(args)` helper that splits flag-tokens from positional-tokens regardless of order. Cobra is the right answer; not pulling the dep yet.'
    - priority: low
      note: 'When the next non-Michael user becomes real, Phase 5 multi-tenant work has full design notes in phases.md. The AGE-Cypher-doesn''t-auto-enforce-RLS caveat is the load-bearing thing to remember. Three mitigation options written down; pick when the time comes.'
questions:
    - 'Should phase splitting happen automatically when phase-doc is imported (single `--source phase-doc:foo` produces both the phase-doc row AND the per-phase rows), or stay as two separate import passes (`phase-doc:foo` + `phase:foo`)? Current two-pass model is explicit but error-prone (forget the second pass and you get phase-doc with no phases). Auto-split would couple them; explicit is honest. Lean toward auto-split with an opt-out flag (`--no-split`).'
    - 'context_for returns SIMILAR_TO with confidence=0 and provenance=unknown because the embed pipeline doesn''t populate those edge properties. Should the embedder set provenance=''inferred'' and confidence=''cosine_distance''? That would make context_for output more legible (the user could filter `provenance=declared` to see only the human-asserted graph). Cheap change to the embed work_kind. Worth doing in Phase 2.7 or 3.'
    - 'a.ibeco.me design: when we get there, should it be a separate Vue 3 SPA in `scripts/becoming/frontend/`, or a sub-route of the existing app? Sub-route keeps auth/session shared but couples deploys. Separate keeps them independent but requires SSO setup. Probably sub-route given they share user identity, but defer until Phase 3.'
