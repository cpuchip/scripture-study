discoveries:
  - title: "Moses 6 — the gospel was taught to Adam"
    detail: >
      Deep chapter-by-chapter read of Moses 6 revealed the gospel
      pattern from the very beginning: Adam received baptism, the gift
      of the Holy Ghost, and priesthood ordinances. The gospel isn't
      an invention of the meridian of time — it was present at the start.
      One of the best pre-tool studies (20.6K), every quote verified.

  - title: "Doctrines, principles, and programs — the hierarchy matters"
    detail: >
      Distinguishing between eternal doctrine, true principles, and
      administrative programs prevents confusion when programs change.
      The gospel doesn't change; the implementation does. This framing
      clarifies many apparent contradictions in church history.

  - title: "Download bugs require patience"
    detail: >
      Three separate download fixes across two days — general manuals,
      magazines, Teachings of the Presidents (17 individual books).
      Building a local gospel library requires handling every format
      variation the church website produces.

