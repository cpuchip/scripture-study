carry_forward:
  - priority: high
    item: "This study is a natural predecessor to a study on adoption and becoming sons and
      daughters of God — the D&C 76:24 thread ('begotten sons and daughters') deserves its
      own treatment."
  - priority: medium
    item: "The Moses 5:9 phenomenon — Holy Ghost speaking in first person as the Only Begotten
      — is unusual enough to deserve its own note or study. What does it mean that the Holy
      Ghost witnesses by becoming, momentarily, the voice of the Son?"
  - priority: medium
    item: "The 'bosom of the Father' image (John 1:18, D&C 76:13, 25) — covenant intimacy
      language — would reward a focused word study against ancient Near Eastern covenant
      traditions."
  - priority: low
    item: "A companion study on 'Firstborn' (prototokos) across the standard works would
      complete the set: Only Begotten deals with unique sonship, Firstborn deals with
      priority and inheritance."

open_questions:
  - "Why does Moses 5:9 have the Holy Ghost speak in the first person as the Only Begotten?
    Is this a typological/pedagogical speech act, or does it reveal something about the
    relationship between the Holy Ghost and the Son that the rest of scripture doesn't
    articulate?"
  - "D&C 93 says Christ 'received not of the fulness at the first.' What was the nature
    of that growth? Was it experiential (learning through suffering, as Heb 5:8 says)?
    Developmental (acquiring capacities)? Or something more mysterious about the relationship
    between the divine will and the divine fullness?"
  - "The BD note says Jesus never says 'our Father' in a common address with disciples.
    Is this consistent throughout the JST? Does the JST ever change any instance of this?"
