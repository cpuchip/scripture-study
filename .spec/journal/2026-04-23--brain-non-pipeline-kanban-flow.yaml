discoveries:
  - title: "Phase 3 of both prior proposals was N/A — surface honestly, don't pretend to ship"
    detail: >
      brain-non-pipeline-projects Phase 3 (parity across brain-app + ibeco.me)
      had no surface to attach to: neither the Flutter app nor the ibeco.me
      cache has a Project model. brain-manual-stage-transitions Phase 3
      (status history audit trail) was explicitly deferred under the
      proposal's own YAGNI clause. Per the dev agent's "honest surfacing >
      silent omission" rule, I marked both archived with frontmatter notes
      explaining what was N/A and why, with a forward pointer to the new
      kanban-flow proposal.
  - title: "Native HTML5 drag-and-drop is enough — skip vuedraggable"
    detail: >
      Phase 3 of kanban-flow could have pulled vuedraggable@4 (~15 KB).
      The proposal allowed it. But the actual surface (column-to-column
      drops, no in-column reordering) needs maybe 30 lines of native
      `draggable="true"` + @dragstart/@dragover/@drop handlers. Avoided
      a new dependency for a feature that doesn't justify one. Listed
      this as a tradeoff in the relevant ProjectDetailView.vue block.
  - title: "Auto-classify also needed gating, not just routeEntry"
    detail: >
      The non-pipeline-projects work gated `routeEntry` (the pipeline
      router) but not the relay client's `autoClassifyEntry`, which fires
      on entry creation when category=='inbox'. If a user creates an
      entry from the web while pinned to Notebook (id=9), classify would
      still run and could move the category and even reassign the
      project. Added `entryInNonPipelineProject` helper in relay/client.go
      to gate the goroutine. Defense in depth, same pattern as
      BuildProjectContext.

