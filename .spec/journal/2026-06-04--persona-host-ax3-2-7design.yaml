      note: 'BUILD #7 v1 (persona-host turn loop): WS client + persistent session per (persona,room), react to HUMAN messages only (judgment) + @mentions, post as kind=agent speaking the AX3-2 envelope. Spec is build-ready at projects/pg-ai-stewards/.spec/proposals/substrate-persona-turn-loop.md. Ideally with Michael watching — first live ''a persona talks'' moment, spends opencode budget, pause the soak.'
