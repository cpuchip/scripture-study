# ─── WHAT SHIPPED ──────────────────────────────────────────────────────────────

shipped:
  enriched_indexer_proposal:
    description: "Full 360-line proposal for TITSW-enriched talk summaries in gospel-vec"
    details: >
      5 phases: 0=experiments (COMPLETE), 1=talk enrichment, 2=scripture enrichment,
      3=manuals+themes, 4=combined tool integration. Vocabulary vs. lens distinction
      established. Michael decided: keep love/spirit scores, theme detection for Phase 3,
      full reindex approved, explore parallelism.
    file: ".spec/proposals/enriched-indexer.md"

  phase0_experiments:
    description: "18 runs across 6 experiment conditions × 3 ground-truth talks"
    details: >
      T4 (calibration example) won with MAE=1.83. Gospel-vocab confirmed as the inflation
      culprit (love: +5 to +6 across all talks in T2). Love/spirit inflation persists even
      with best context (+2 to +4) — inherent model bias. Decision: use calibration context
      for Phase 1 batch, but refine first (different speaker, multiple examples, explicit
      "most dimensions score 3-5" guidance).
    file: "experiments/lm-studio/scripts/results/phase0-analysis.md"

  enriched_search_proposal:
    description: "263-line proposal for gospel-mcp TITSW integration"
    details: >
      Option C chosen (ALTER TABLE talks, import gospel-vec cache). Schema design, FTS
      enhancement, search/get tool enhancements all spec'd. NOW SUPERSEDED by combined
      tool decision — but schema designs remain valid reference.
    file: ".spec/proposals/enriched-search.md"
    status: "superseded-in-current-form"

  gospel_graph_proposal:
    description: "study.ibeco.me — standalone gospel graph visualization site"
    details: >
      Originally written as an ibeco.me extension (Option C), reworked after Michael's
      direction to a standalone site with own Go backend, Vue 3 frontend, PostgreSQL.
      5 phases, sequenced after enriched indexer. Import pipeline from gospel-mcp +
      gospel-vec + byu-citations. Cytoscape.js for graph rendering.
    file: ".spec/proposals/gospel-graph/main.md"

  parallel_test_infrastructure:
    description: "run-parallel-test.ps1 — tests 1x-4x concurrency on LM Studio"
    details: >
      Built to validate enriched indexer parallelism claims. Tested nemotron-3-nano
      at 1x, 2x, 3x, 4x concurrent requests.
    file: "experiments/lm-studio/scripts/run-parallel-test.ps1"

# ─── DECISIONS ─────────────────────────────────────────────────────────────────

decisions:
  combined_gospel_tool:
    description: >
      Build a NEW combined gospel tool merging gospel-mcp (SQLite/FTS) and gospel-vec
      (vector/chromem-go) into one application. Keep originals unchanged for study use
      during reindexing.
    rationale: >
      "I want to keep gospel-mcp and gospel-vec for study work during reindexing."
      The new combined tool avoids disrupting working MCP servers while enabling unified
      structured + semantic search. The originals stay stable.
    impact: >
      Supersedes enriched-search.md Option C. Schema and tool enhancement designs remain
      valid — just target the new tool. New proposal needed.

  gospel_graph_standalone:
    description: >
      study.ibeco.me is a standalone site, NOT an ibeco.me extension. Own codebase,
      own PostgreSQL database, own Dokploy container.
    rationale: >
      "I don't want to take the burden of verifying all the things." Separate site avoids
      ibeco.me verification burden, allows independent evolution.

  calibration_context_for_batch:
    description: >
      Use T4 calibration context for Phase 1 batch enrichment. Refine first: different
      speaker for calibration example, consider 2-3 examples, add "most dimensions score
      3-5" guidance.

