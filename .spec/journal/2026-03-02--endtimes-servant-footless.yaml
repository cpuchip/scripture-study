date: "2026-03-02"
session_id: "endtimes-servant-footless"
duration_estimate: "long — full phased study session"

intent: >
  Michael asked: 'What would this study look like without those aids?
  Can we run that as a separate study? Do we draw the same conclusions?'
  A companion to the endtimes-servant.md study, deliberately stripping
  LDS footnotes, chapter headings, and Topical Guide to test whether
  the multi-referent servant reading (Christ + Joseph Smith + collective
  priesthood) stands on the text alone.

discoveries:
  - title: "Footnotes are hyperlinks, not arguments"
    detail: >
      The core finding: the multi-referent reading survives COMPLETELY
      without footnotes. D&C 113 (revelation), D&C 103:21 (revelation
      naming Joseph Smith), 2 Nephi 3:15 (text naming Joseph), D&C 86:11
      (text applying servant language to priesthood collectively), and
      Mosiah 15 (Abinadi establishing Christ as Isaiah 53's servant) —
      all stand without editorial apparatus. The footnotes are convenient
      hyperlinks, not load-bearing arguments.

  - title: "Gileadi's future-servant door opens wider without headings"
    detail: >
      When you remove chapter headings that say 'the Messiah' or 'Joseph
      Smith,' Avraham Gileadi's reading becomes more plausible — that
      'my servant David' (Ezekiel 34, 37) and the rod/root (Isaiah 11)
      refer to a FUTURE Davidic figure still hidden from the world. The
      text genuinely leaves this door ajar. Headings close it; the text
      alone leaves it open.

  - title: "BYU Citation Index reveals scholarly consensus clearly"
    detail: >
      2 Nephi 3:15 has 18 BYU citations, ALL applying to Joseph Smith
      (from Parley P. Pratt to M. Russell Ballard). 3 Nephi 21:10 has
      only 1 citation (John Taylor JD 19:81b). Isaiah 52:13 has ZERO.
      The citation density reveals where the tradition has consensus
      vs. silence.

  - title: "Abinadi's hermeneutic is the key to multi-referent reading"
    detail: >
      Mosiah 15:1 — 'God himself shall come down among the children of
      men' — is the definitive canonical ruling on Isaiah 53. Abinadi
      doesn't just apply Isaiah to Christ; he demonstrates HOW prophetic
      multi-referent reading works. His seed (Mosiah 15:11-12) are those
      who hearkened to the prophets. This reading method is itself a model.

  - title: "D&C 103:21 is the Joseph-as-Moses smoking gun"
    detail: >
      No footnotes needed. D&C 103:21 says explicitly: 'I will raise up
      unto my people a man, who shall lead them like as Moses... and he
      shall be called Joseph, and it shall be of the stock of Joseph Smith,
      Jun.' This is revelation, not editorial apparatus. The text names him.

surprises:
  - >
    Isaiah 42 does the multi-referent work WITHIN A SINGLE CHAPTER.
    Verse 1 is the ideal servant; verse 19 is the blind servant (Israel).
    You don't need footnotes to see the contrast — the chapter itself
    demands two referents. Multi-referent reading is the text's own method.
  - >
    The 'marred yet healed' tension in 3 Nephi 21:10 is more visible
    without footnotes. Joseph Smith was martyred (marred) but never
    visibly healed. The text literally says 'yet I will heal him.' This
    haunting unresolved tension either points to resurrection, a future
    fulfillment, or something we haven't seen yet.
  - >
    D&C 86:11 — 'ye are lawful heirs... and your life and the priesthood
    have remained... therefore ye are a light unto the Gentiles, and
    through this priesthood, a savior unto my people Israel.' Collective
    servant language applied to every priesthood holder. The Isaiah 49
    prophecy isn't about ONE person. It's about a people.

relationship:
  - quality: "genuine-methodological-partnership"
    detail: >
      This study was born from Lord Bunvader's challenge that I'd default
      to 'Christ or Joseph Smith.' Michael turned that into a real
      experiment — a companion study with explicit rules. The AI had to
      suppress its trained instinct to cite footnotes and instead reason
      from text alone. The discipline was productive.
  - quality: "study-exp1-workflow-validated"
    detail: >
      First full run of the phased writing workflow. The scratch file at
      study/.scratch/endtimes-servant-footless.md preserved 17 verified
      quote entries across the session. The critical analysis phase (3a)
      caught real weaknesses before they went into the draft. The workflow
      works — externalized memory survives context compaction, and the
      critical analysis step makes the final draft stronger.

carry_forward:
  - priority: high
    note: >
      Abinadi's hermeneutic method (Mosiah 13-16) deserves its own study.
      HOW he reads Isaiah is as revelatory as WHAT he teaches. He's the
      model for deep reading without institutional apparatus.
  - priority: medium
    note: >
      The 'marred yet healed' tension in 3 Nephi 21:10 remains genuinely
      unresolved. Worth tracking as the endtimes arc continues.
  - priority: medium
    note: >
      Gileadi's Isaiah Institute material is substantive and worth deeper
      engagement. His literary analysis of Isaiah's typological structure
      (Bifid chiastic literary structure) is respected even by scholars
      who reject his conclusions.
  - priority: low
    note: >
      JST Genesis 50 was mentioned as a potential source but never read.
      It's another Joseph-name prophecy that would strengthen or complicate
      the footless reading.

open_questions:
  - "If footnotes are hyperlinks and not arguments, what IS the role of the study apparatus? Is it Topical Guide that does the real interpretive work, not the footnotes themselves?"
  - "Can Gileadi's future-Davidic-servant reading coexist with the Joseph Smith identification, or are they mutually exclusive?"
  - "Why does 3 Nephi 21:10 have only ONE BYU citation when it's such a pivotal verse? Is it underexplored or considered too clear to need commentary?"
