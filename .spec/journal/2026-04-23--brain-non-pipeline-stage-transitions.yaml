  - "scripts/brain-app/lib/screens/edit_entry_screen.dart: status DropdownButtonFormField with all 6 statuses"
  - "scripts/brain-app/lib/screens/history_screen.dart: _setStatus + _showStatusQuickActions + _statusColor + long-press wired into _HistoryCard"
  - ".spec/proposals/brain-non-pipeline-projects.md: status → shipped Phase 1+2"
  - ".spec/proposals/brain-manual-stage-transitions.md: status → shipped Phase 1 mobile (Phase 2 web pre-existing)"
  - ".mind/active.md: both items added to Recently Shipped"

verification:
