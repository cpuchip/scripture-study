date: "2026-04-04"
session_id: "billing-overhaul-and-memory-reset"
duration_estimate: "~3 hours across one long session"

intent: >
  Four-part session: (1) Complete billing model overhaul from token caps
  to premium request tracking, rename MCP key. (2) Capture Space Center
  dream business in persistent memory. (3) Migrate active.md — archive
  cold/medium content, keep it lean. (4) Research and plan Claude Code
  integration as alternative agent backend. Plus workstream status review.

discoveries:
  - title: "Claude Code has two integration paths — only one uses Pro subscription"
    detail: >
      The Claude Agent SDK (Python/TypeScript) uses API key billing from
      the Anthropic Console — NOT the Pro subscription. The CLI subprocess
      approach (`claude -p`) uses Pro subscription billing ($20/mo). Since
      cost-spreading across Pro plans was the goal, the CLI path is the
      correct choice. This distinction wasn't obvious from marketing pages.

  - title: "Active.md had grown to ~350 lines — 75% was cold history"
    detail: >
      Completed phases, shipped model experiments, finished gospel engine
      work — all still in active.md. Migrated to an archive file, got
      active.md down to ~95 lines. The lean version is much more useful
      as session context. Should archive quarterly or after major cycles.

  - title: "Overview proposal is significantly stale"
    detail: >
      Written Mar 12, last touched Mar 22. WS1 is two full phases ahead
      of what it shows. Two studies done that it lists as upcoming. Gospel
      Engine (5 phases) isn't in it at all. Claude Code integration is new.
      Needs a refresh session — but that's separate planning work.

  - title: "Pipeline cost model is cleaner than expected"
    detail: >
      Research pass at 0.33 (Haiku) + Plan pass at 1.0 (Sonnet) = 1.33
      premium requests per brain entry. With 1500/month budget (Pro+) that's
      ~1125 entries before cost pressure. Plenty of headroom at 19% utilization.

surprises:
  - >
    The billing model change was entirely additive — no test failures,
    no compilation errors. Removing TokenHardCap simplified the code.
    checkBudgetBeforePrompt() was enforcement pretending to be
    observability, and removing it made the actual intent clearer.
  - >
    Michael's Space Center dream (planetarium, bridge simulator) has
    related repos already on GitHub. Not just a dream — there's code
    artifacts. Worth surface-level inventory at some point.

tensions: []

