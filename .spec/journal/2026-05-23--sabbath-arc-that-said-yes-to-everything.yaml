principle_proposed_not_ratified: >
  Subproject memory must bubble. When a project under projects/* has its own
  .spec/journal/, the cycle-level memory of that project must also produce a
  workspace-level journal entry — one per substantive work cycle, not one per
  commit. The subproject keeps detail; the workspace gets the headline.
