date: "2026-03-04"
title: "Divine Love study — disposition vs. access, the father was watching the road"
type: study

summary: >
  Michael asked whether God's love is conditional, prompted by Nelson's "Divine Love"
  article. He held two truths in tension: God favors those who serve him, AND God is
  no respecter of persons. He kept thinking about the prodigal son.
  
  Third run of study-exp1 workflow, first with the refined binding question + ring/posture
  checks from the Abinadi session. The workflow performed well — the scratch file caught
  all verified quotes, the critical analysis phase caught three claims that needed qualifying,
  and the ring check confirmed the study answers its binding question.
  
  Core finding: "Is God's love conditional?" is the wrong question. God's love is His
  nature (1 John 4:8 — "God IS love"). What's conditional is blessings and our capacity
  to feel that love. The condition is not earning but turning — "when he came to himself"
  (Luke 15:17). The prodigal's father was watching the road the entire time.
  
  Nelson's article makes the love-vs-blessings distinction his own framing obscures. Oaks'
  "Love and Law" (2009) provides a more careful synthesis. Moses 7 (God weeps over the
  wicked) proved devastating to the conditional-love frame — a God of conditional love
  would simply stop loving and move on, but this God weeps.

discoveries:
  - label: "Nephi's double truth in one sermon"
    detail: >
      1 Ne 17:35 ("esteemeth all flesh in one; he that is righteous is favored")
      and 17:40 ("loveth those who will have him to be their God") are five verses
      apart in the SAME speech. Nephi holds both universal valuation and responsive
      engagement without seeing a contradiction. This structural coincidence became
      the binding question and the study's anchor.
  - label: "Webster 1828 love/esteem/favor distinction"
    detail: >
      "Love" is dispositional attachment. "Esteem" is valuation — "to set a value on,
      to prize." "Favor" is directional active support — "kind regard, propitious aspect,
      friendly disposition, befriending." God esteems all flesh in one (universal), but
      favors the righteous (responsive). The words resolve the tension Nephi holds.
  - label: "D&C 95 self-resolving tension"
    detail: >
      Verse 12 ("if you keep not my commandments, the love of the Father shall not
      continue with you") is the strongest conditional-love proof text. But verse 1
      frames the entire section: "whom I love I also chasten that their sins may be
      forgiven... and I have loved you." The chastening IS the love. The love precedes
      and motivates the conditions.
  - label: "Moses 7 — God weeps"
    detail: >
      A God of conditional love would simply stop loving the disobedient and move on.
      But God weeps over the wicked. "The whole heavens shall weep over them, even all
      the workmanship of mine hands" (Moses 7:37). The weeping proves the love persists
      through the rejection.
  - label: "Nelson's own distinction buried in his article"
    detail: >
      Nelson himself writes: "Does this mean the Lord does not love the sinner? Of
      course not. Divine love is infinite and universal." And: "The gift of immortality
      is unconditional." His text distinguishes love from blessings — but his title
      and most-quoted line ("cannot correctly be characterized as unconditional")
      conflate what his own text separates.

