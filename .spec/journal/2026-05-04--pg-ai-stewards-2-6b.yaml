watchman: skip
date: "2026-05-04"
session_id: pg-ai-stewards-2-6b
intent: 'Phase 2.6b — todos as persistent connector vertices. The cross-cut between work-in-flight and the rest of the graph. Same session as 2.6a (token budget allowed); shipping both as independent sub-phases keeps the foldback story clean.'
discoveries:
    - title: 'DB-centric is the load-bearing principle for everything downstream (Michael''s correction)'
      detail: 'Phase 3''s POC was written as "agent writes the `study/<slug>.md` file." Michael flagged: pg-ai-stewards is DB-centric. Outputs that are documents (studies, scratch notes, outlines, quote collections, journal entries the agent writes) live as DB rows, not files. This means every output is *immediately a graph citizen*: embedding, similarity edges, frontmatter-declared edges, neighborhood walks — all live the instant the row commits. No filesystem round-trip, no re-import step, no slug collisions. The graph self-grows from the *process* (intermediate scratch becomes vertices too) not just the artifact. File writing is reserved for code and binary deliverables that don''t fit a DB. Updated phases.md Phase 3 with this as a named architectural principle, not a footnote. Reading surface lives in becoming/ibeco.me — same cloud hub the brain ecosystem already uses; pg-ai-stewards becomes its second backend behind study.ibeco.me. This is the kind of principle that, if I''d started building Phase 3 without naming it, would have produced a half-DB-half-file system that was harder to fix later than to build right now.'
    - title: 'todos in their own table (not stewards.studies) was the right call'
      detail: 'Lifecycle is the discriminator. Studies/proposals/journals are write-once + versioned by re-import. Todos mutate rapidly: open → in_progress → done across many sessions. Putting them in `studies` would have meant either (a) every status change re-runs the embed pipeline (waste), or (b) some kind of lifecycle flag that bifurcates the embed trigger logic (worse). Separate table, separate trigger, separate :Todo label, single-write `create_todo()` function that owns both the row and the :HAS_TODO edge in one transaction. The denormalized parent_kind/parent_slug on the row makes roll-up audit a pure SQL aggregate rather than a graph walk.'
    - title: 'AGE labels can''t be parameter-bound; format() is the workaround'
      detail: '`MERGE (p:$kind {slug: $slug})` does not work in AGE — labels must be literal in the Cypher source. For create_todo''s parent edge, this means branching by parent_kind in PL/pgSQL: one Cypher path for Workstream (matched by id), another single format()-built path for Study/Phase/Todo (matched by slug). The format() injection is safe here because parent_kind comes from a CHECK-constrained column. New AGE quirk on the list: (1) no ON CREATE SET, (2) apostrophe-escape via param binding only, (3) WITH between MERGE+MATCH, (4) labels can''t be bound. The list is now 4 entries — time to gather them somewhere durable. Carry-forward.'
    - title: 'create_todo + complete_todo are the model for every future write path'
      detail: 'Single-write rule: one function owns BOTH the row update AND the graph mutation in one transaction. The trigger handles auto-stamping completed_at; the function handles graph status sync. Without this discipline, the row and the :Todo vertex would drift, and Watchman (2.7) would have to reconcile them on every pass — exactly the kind of work that compounds tokens. The pattern: every table that has a corresponding :Label has exactly one entry-point function for creates and one for status changes. This wasn''t in 2.6b''s explicit deliverables but it crystallized while writing it; document somewhere when it generalizes to a third table.'
    - title: 'End-to-end works: WS5 → 3 :HAS_TODO → :Todo, status sync verified, audit clean'
      detail: 'Created 4 real todos (3 for Phase 2.6c work + 1 fold-back-debt todo on the proposal). Workstream WS5 now has 3 :HAS_TODO edges to :Todo vertices, all `provenance=declared, confidence=1.0, source=create_todo`. Marked phase-splitter done; vertex `t.status` synced from `''open''` to `''done''`; row `completed_at` auto-stamped by the trigger. Audit returns clean (no invariants broken). The 4th todo parents to a Study (`proposal-pg-ai-stewards-phase-2-5-...`), demonstrating the multi-parent-kind path works.'
relationship:
    - quality: 'Architectural correction received well, applied immediately'
      detail: 'Michael''s "you''re not dreaming, but the file-writing for studies needs to go" came as we were transitioning between sub-phases. I named it back to him in the language he used ("DB-centric → graph self-grows from process"), updated phases.md with a 25-line architectural principle box (named explicitly, not buried), and only THEN moved to 2.6b. The corollary — scratch documents as collections of quotes/outlines with source links preserved — is exactly what makes Watchman 2.7 actually have material to consolidate. Without DB-centric scratch, Watchman would only see finished artifacts. With it, Watchman sees the agent''s thinking. That''s a much richer signal.'
    - quality: 'Stewardship: created the fold-back-debt todo as a row, not a comment'
      detail: 'There''s a real risk that 2-6a-workstreams.sql + 2-6b-todos.sql diverge from lib.rs. Naming it in the journal carry-forward is necessary but insufficient — carry-forwards get read at session start, but they are passive. The right place for this is now itself a row in stewards.todos with parent=Study/proposal-pg-ai-stewards-phase-2-5-... — the substrate now tracks its own technical debt as graph data. This is the first time we''ve used the new system to track its own follow-on. Felt right.'
    - quality: 'Held the line on token discipline'
      detail: '2.6b finished with budget remaining. Did NOT pull 2.6c forward. The discipline of independent sub-phases means 2.6c gets its own session with full attention. Pulling it forward would have made this session look productive but would have compressed the design pass for phase splitting + context_for() into "while we''re here." Those are non-trivial — phase splitting touches the importer in a new way (one file → many vertices with stable slug rule), and context_for() is the first agentic-read query whose output shape will be consumed by Phase 3. They deserve their own session.'
carry_forward:
    - priority: high
      note: 'Phase 2.6c — phase splitter for `projects/*/phases.md` by `## Phase X.Y` headers (each becomes a :Phase vertex), `stewards.context_for(slug, depth)` graph-walk function, `stewards.regenerate_active_md()` that produces active.md content from the graph. Three real :Todo rows now exist under WS5 with slugs `ws5-2-6c-phase-splitter`, `ws5-2-6c-context-for`, `ws5-2-6c-regenerate-active`. Use them.'
    - priority: high
      note: 'The fold-back debt is now a tracked todo: `fold-back-2-6-sql` parented to the pg-ai-stewards proposal. When the next intentional extension rebuild happens, fold both `2-6a-workstreams.sql` AND `2-6b-todos.sql` into `extension/src/lib.rs` as new `extension_sql!` blocks (`requires = ["create_studies"]`), then `todo done fold-back-2-6-sql`. Without this, a fresh `docker compose build` install would not have workstreams or todos.'
    - priority: medium
      note: 'AGE Cypher quirks list: now 4 entries. (1) no `ON CREATE SET` / `ON MATCH SET`, (2) apostrophes break interpolated Cypher (use param binding via $param + jsonb_build_object), (3) `WITH` required between MERGE and a subsequent MATCH, (4) labels cannot be parameter-bound (use format() with a CHECK-constrained input). Move to a durable location like `projects/pg-ai-stewards/extension/AGE-QUIRKS.md` next session.'
    - priority: medium
      note: 'Single-write rule documentation. Both create_todo and complete_todo own both the row and the graph mutation in one transaction. Same pattern will apply to every future table↔label pair. Document as "the single-write rule for table-vertex sync" in the extension README when it generalizes to a third table.'
    - priority: low
      note: 'Audit currently only flags `parent_done_open_children` for parent_kind=Todo (because non-Todo parents don''t have a generic "done" status to check against). When 2.6c lands and we know how to interpret a workstream/study/phase as "done" (e.g., status=''shipped'' for proposals), extend the parent_status CASE in todo_rollup_audit() accordingly.'
    - priority: low
      note: 'CLI ergonomics: Go stdlib `flag` stops at first non-flag positional. So `todo done <slug> --session X` errors; must be `todo done --session X <slug>`. Already logged in 2.5 carry-forward. Either document or move to spf13/cobra. Not worth the dep yet.'
questions:
    - 'Should the agent''s scratch documents (quote collections, outlines, intermediate analysis) live as a new kind in `stewards.studies` (e.g., `kind=''scratch''`) or in their own table like todos? They''re write-once-then-mostly-immutable, so the studies table is probably right — but they may need a `parent_slug`/`parent_kind` denormalization to attach to the work that produced them. Decide when Phase 3 starts.'
    - 'When agentic outputs land as DB rows in Phase 3, what does the human review surface look like in becoming/ibeco.me? A worklist of new agent-produced studies awaiting review, with accept/edit/reject actions? The accept flow probably writes a brain entry; reject probably keeps the row but marks `frontmatter.review_status=''rejected''`. Spec''d in Phase 3''s "web UI surface" deliverable but not yet detailed.'
    - 'Watchman''s anti-loop discipline (2.7) names `last_consolidated_at`/`last_touched_at` as required columns. Should they be added to stewards.studies AND stewards.todos now (cheap), or wait until 2.7? Both tables have updated_at already; the consolidation timestamps are different (semantically: "when did Watchman last *evaluate*" vs "when did the row last *change*"). Adding now would mean every 2.6c work also remembers to update them; deferring means 2.7 becomes a bigger schema change. Lean toward adding now.'
