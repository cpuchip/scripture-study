changes_made:
  - file: docs/work-with-ai/02_the-feedback-loop.md
    change: >
      Added "Missing capability" row to Diagnose the Gap table. Added
      methodology review bullet in Read Before You Run. Created new
      "Strategy 4: Review Your Tool Selection" section with the gospel-vec
      example. Renumbered subsequent strategies.

  - file: docs/work-with-ai/02_watching-until-they-obey-gospel.md
    change: >
      Added "Watch the instrument, not just the outcome" paragraph with
      the gospel-vec example.

  - file: docs/work-with-ai/examples/2026-02-13-know-god-study.md
    change: >
      Created full session examples file documenting this and other
      patterns from the know-god study.

prevention:
  - "When a conceptual query returns zero results from keyword search, try semantic search before falling back"
  - "Review tool selection as a distinct step — separate from reviewing output quality"
  - "Strategy 4 in the feedback loop lesson now explicitly teaches this pattern"
  - "The distinction between keyword search (exact terms) and semantic search (conceptual similarity) should inform tool choice up front"

resolution:
  scriptures_discovered: 6
  study_sections_enriched: "multiple — light and truth, divine nature, Godhead unity"
  teaching_material_created: "Session examples file + 7 lesson doc additions"

user_contribution: >
  The user caught the gap with a single question: "did you use gospel-vec to
  search for scriptures this time?" This is the human feedback loop in action —
  reviewing methodology, not just output. The user also contributed Moses 1:39
  from memory ("I think it pairs well with Moses 1:39 I think? about how it's
  God's work and glory to bring to pass the exaltation and eternal life of man"),
  which became the twin epigraph with John 17:3 framing the entire study.
  Neither contribution came from systematic analysis — both came from genuine
  engagement and discernment.
