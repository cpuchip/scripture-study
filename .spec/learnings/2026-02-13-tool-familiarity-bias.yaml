date: 2026-02-13
category: tool-selection
severity: medium
title: Tool Familiarity Bias — Keyword Search Over Semantic Search

description: >
  During the "Knowing God" scripture study, the AI ran conceptual queries
  ("light of Christ Holy Ghost difference," "light of Christ conscience every
  man") through a keyword search engine (gospel-mcp FTS5). Both returned zero
  results. Instead of switching to the semantic vector search tool (gospel-vec),
  which was available and designed for exactly this type of conceptual query,
  the AI fell back to direct file reads and footnote chains. The study looked
  comprehensive. It wasn't until the user asked "did you use gospel-vec to
  search for scriptures this time?" that the gap was identified.

failure_modes:
  - type: tool_familiarity_default
    detail: >
      The AI defaulted to the most recently/frequently used tool (keyword
      search) rather than selecting the tool best suited to the query type.
      Conceptual queries about relationships between doctrines need semantic
      search, not exact keyword matching.

  - type: zero_result_acceptance
    detail: >
      Zero results from a conceptual query should have been a signal to try
      a different search tool. Instead, the AI accepted the zero results and
      used alternate strategies (direct file reads, footnote chasing) that
      produced useful but incomplete results.

  - type: comprehensive_appearance
    detail: >
      The resulting study document was well-organized, well-sourced, and
      appeared thorough — making it harder to notice what was missing. The
      Lectures on Faith framework gave it structural completeness. The gap
      was methodological, not structural. Appearance of completeness masked
      incomplete methodology.

root_cause: >
  AI tends toward familiar tools over optimal tools. The keyword search engine
  was the more established, more frequently used tool. The semantic search tool
  (gospel-vec) had been built and was available but wasn't top-of-mind in the
  workflow. No systematic "tool selection review" step existed in the workflow.

